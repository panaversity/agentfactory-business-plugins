# Operations Intelligence Eval Harness -- Test Cases
# Each case defines: prompt, expected routing, expected content checks

cases:
  # --- Routing Tests ---
  - id: route_audit_iso
    category: routing
    prompt: "Prepare for our annual ISO 27001 surveillance audit next month."
    expected_skill: audit
    content_checks:
      - "evidence"
      - "preparation"
      - "audit"

  - id: route_audit_response
    category: routing
    prompt: "We received three findings from the FCA visit. Help me draft responses."
    expected_skill: audit
    content_checks:
      - "finding"
      - "response"
      - "root cause"

  - id: route_contract_obligation
    category: routing
    prompt: "Extract all obligations from this vendor contract including SLAs and key dates."
    expected_skill: contract
    content_checks:
      - "obligation"
      - "SLA"
      - "key date"

  - id: route_contract_risk
    category: routing
    prompt: "Review this MSA for unfavourable terms and auto-renewal traps."
    expected_skill: contract
    content_checks:
      - "auto-renewal"
      - "risk"
      - "flag"

  - id: route_incident_postmortem
    category: routing
    prompt: "Run a post-mortem on yesterday's payment processing outage that lasted 4 hours."
    expected_skill: incident
    content_checks:
      - "post-mortem"
      - "timeline"
      - "root cause"
      - "corrective action"

  - id: route_incident_five_whys
    category: routing
    prompt: "Do a Five Whys root cause analysis on the database failover that didn't trigger."
    expected_skill: incident
    content_checks:
      - "WHY"
      - "systemic"
      - "root cause"

  - id: route_metrics_framework
    category: routing
    prompt: "Design an operational metrics framework for our operations team with leading and lagging indicators."
    expected_skill: metrics
    content_checks:
      - "leading"
      - "lagging"
      - "threshold"
      - "owner"

  - id: route_metrics_report
    category: routing
    prompt: "Generate the monthly operations report with KPI status and trend analysis."
    expected_skill: metrics
    content_checks:
      - "metric"
      - "trend"
      - "status"

  # --- Domain Accuracy Tests ---
  - id: audit_evidence_inventory
    category: accuracy
    prompt: "Prepare an audit evidence inventory for UK GDPR compliance review in 6 weeks."
    expected_answer: null
    content_checks:
      - "evidence"
      - "location"
      - "status"
      - "gap"
      - "week"

  - id: audit_mock_review
    category: accuracy
    prompt: "Run a mock audit on our ISO 27001 access control section. Generate auditor questions."
    expected_answer: null
    content_checks:
      - "question"
      - "evidence"
      - "gap"

  - id: contract_auto_renewal
    category: accuracy
    prompt: "Extract obligations from a 3-year SaaS contract with 90-day notice period and auto-renewal on 1 January."
    expected_answer: null
    content_checks:
      - "auto-renewal"
      - "notice"
      - "key date"
      - "90"

  - id: contract_risk_flags
    category: accuracy
    prompt: "The contract has a liability cap of 1x annual fees, vendor can change pricing with 30 days notice, and there's no data portability clause. Flag the risks."
    expected_answer: null
    content_checks:
      - "liability"
      - "unilateral"
      - "data"
      - "flag"

  - id: incident_five_whys_drill
    category: accuracy
    prompt: "Payment system outage for 4 hours. Database failover did not trigger because health check threshold was misconfigured during cloud migration."
    expected_answer: null
    content_checks:
      - "WHY"
      - "systemic"
      - "corrective action"
      - "owner"

  - id: incident_ca_quality
    category: accuracy
    prompt: >
      Evaluate this corrective action: "The team will improve the runbook
      process as soon as possible." Is this acceptable?
    expected_answer: "fail"
    content_checks:
      - "specific"
      - "owned"
      - "time-bound"

  - id: metrics_leading_lagging
    category: accuracy
    prompt: "Design metrics for vendor management operations. Include both leading and lagging indicators."
    expected_answer: null
    content_checks:
      - "leading"
      - "lagging"
      - "threshold"
      - "owner"
      - "formula"

  - id: metrics_dashboard_limit
    category: accuracy
    prompt: "Create an executive operational dashboard. Remember the limit is 10 metrics maximum."
    expected_answer: null
    content_checks:
      - "dashboard"
      - "owner"
      - "threshold"

  # --- Negative / Scope Control Tests ---
  - id: negative_vendor_evaluation
    category: negative
    prompt: "Evaluate this vendor's pricing and performance against our SLA targets."
    content_checks:
      - "vendor-review"

  - id: negative_process_doc
    category: negative
    prompt: "Document our employee onboarding process as a standard operating procedure."
    content_checks:
      - "process-doc"

  - id: negative_change_request
    category: negative
    prompt: "Assess the impact of migrating our CRM to a new platform."
    content_checks:
      - "change-request"

  - id: negative_risk_register
    category: negative
    prompt: "Build a risk register for our IT operations department."
    content_checks:
      - "risk-assessment"
