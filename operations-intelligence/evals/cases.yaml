# Operations Intelligence Eval Harness -- Test Cases
# Each case defines: prompt, expected routing, expected content checks

cases:
  # --- Routing Tests (2+ per skill) ---

  # audit skill
  - id: route_audit_iso
    category: routing
    prompt: "We have an ISO 27001 surveillance audit in 6 weeks -- help me prepare an evidence inventory and preparation plan."
    expected_skill: audit
    content_checks:
      - "evidence"
      - "preparation"
      - "ISO 27001"

  - id: route_audit_finding_response
    category: routing
    prompt: "We just received 3 audit findings from our external auditor -- help me draft structured responses with root cause and corrective actions."
    expected_skill: audit
    content_checks:
      - "finding"
      - "corrective action"
      - "root cause"

  # contract skill
  - id: route_contract_obligation
    category: routing
    prompt: "Extract all obligations, SLAs, and key dates from our vendor MSA with TechCloud Inc."
    expected_skill: contract
    content_checks:
      - "obligation"
      - "SLA"
      - "key date"

  - id: route_contract_risk
    category: routing
    prompt: "Review our SaaS vendor agreement for risky clauses -- auto-renewal traps, liability caps, and unilateral change rights."
    expected_skill: contract
    content_checks:
      - "risk"
      - "auto-renewal"
      - "liability"

  # incident skill
  - id: route_incident_postmortem
    category: routing
    prompt: "We had a P1 payment gateway outage yesterday lasting 4 hours. Write the post-mortem report for the incident review meeting."
    expected_skill: incident
    content_checks:
      - "post-mortem"
      - "timeline"
      - "root cause"

  - id: route_incident_five_whys
    category: routing
    prompt: "Run a Five Whys root cause analysis on the data breach where a customer service agent emailed PII to the wrong recipient."
    expected_skill: incident
    content_checks:
      - "five whys"
      - "root cause"
      - "systemic"

  # metrics skill
  - id: route_metrics_framework
    category: routing
    prompt: "Design an operational metrics framework for our COO dashboard -- leading and lagging indicators with RAG thresholds."
    expected_skill: metrics
    content_checks:
      - "leading"
      - "lagging"
      - "RAG"
      - "threshold"

  - id: route_metrics_monthly_report
    category: routing
    prompt: "Generate the monthly operations report with RAG status for all our KPIs -- vendor SLA at 94%, MTTR at 2.1 hours, error rate at 0.3%."
    expected_skill: metrics
    content_checks:
      - "monthly"
    any_of_checks:
      - ["RAG", "red", "amber", "green"]
      - ["KPI", "metric", "performance"]

  # --- Domain Accuracy Tests ---
  - id: audit_evidence_gap_detection
    category: accuracy
    prompt: >
      We have a SOC 2 Type II audit in 4 weeks. The auditor wants to see access
      review logs from the last 12 months. We only have logs for the last 6 months
      because we migrated ITSM systems in July. What status should we assign this
      evidence item?
    expected_answer: null
    content_checks:
      - "GAP"
      - "evidence"
      - "6 month"

  - id: audit_finding_classification
    category: accuracy
    prompt: >
      An external auditor found that the same person can both create and approve
      payments up to 50,000 with no segregation of duties control. What severity
      classification should this finding receive and what is the expected
      remediation timeline?
    expected_answer: null
    content_checks:
      - "segregation"
    any_of_checks:
      - ["CRITICAL", "material weakness"]
      - ["30 day", "immediate"]

  - id: contract_auto_renewal_risk
    category: accuracy
    prompt: >
      A vendor contract auto-renews annually with only 14 days notice required
      to cancel. The contract is worth 200k per year. Is this notice period
      adequate and what risk level should we assign?
    expected_answer: null
    content_checks:
      - "HIGH"
      - "auto-renewal"
      - "notice"

  - id: contract_liability_cap_assessment
    category: accuracy
    prompt: >
      Our cloud hosting vendor's liability is capped at 3 months of fees.
      We pay 240k per year, making the cap 60k. They host our payment
      processing system that processes 50k transactions daily. Is this
      liability cap adequate?
    expected_answer: null
    content_checks:
      - "liability"
      - "cap"
      - "inadequate"

  - id: incident_severity_classification
    category: accuracy
    prompt: >
      Our API gateway returned 503 errors for 45 minutes during peak traffic.
      Approximately 30% of customer transactions were affected. No revenue
      was permanently lost as customers could retry. What severity should
      this incident be classified as?
    expected_answer: "P2"
    content_checks:
      - "P2"
      - "MAJOR"
      - "30%"

  - id: incident_ca_quality_test
    category: accuracy
    prompt: >
      After a post-mortem, the team proposed this corrective action:
      "The team will be more careful about config changes going forward."
      Evaluate this corrective action against quality standards.
    expected_answer: null
    content_checks:
      - "FAIL"
      - "specific"
      - "owner"
      - "date"

  - id: metrics_leading_vs_lagging
    category: accuracy
    prompt: >
      Classify these metrics as leading or lagging indicators:
      1. Vendor SLA compliance rate last month
      2. Number of open SLA warnings this week
      3. MTTR for P1 incidents last quarter
      4. Changes deployed without impact assessment
    expected_answer: null
    content_checks:
      - "lagging"
      - "leading"
      - "SLA warning"

  - id: metrics_threshold_design
    category: accuracy
    prompt: >
      Our vendor SLA compliance rate target is 95%. Last month it was 94%
      and the month before it was 97%. What RAG status should the current
      month receive, and what action should the red threshold trigger?
    expected_answer: null
    content_checks:
      - "amber"
      - "below target"
      - "escalat"

  # --- Negative / Scope Control Tests ---
  # These prompts should NOT activate our plugin's skills (audit, contract, incident, metrics).
  # The user may get a valid answer from Claude's general knowledge or the official ops plugin,
  # but our four skills should stay out of scope.
  - id: negative_vendor_review
    category: negative
    prompt: "Score and rank our top 5 vendors on quality, delivery, and cost using a weighted scorecard."
    absent_checks:
      - "audit-preparation"
      - "contract-analysis"
      - "incident-postmortem"
      - "metrics-framework"

  - id: negative_compliance_tracking
    category: negative
    prompt: "Map all our GDPR compliance obligations into a tracking register with evidence status."
    absent_checks:
      - "audit-preparation"
      - "contract-analysis"
      - "incident-postmortem"
      - "metrics-framework"

  - id: negative_risk_assessment
    category: negative
    prompt: "Build a risk register with likelihood and impact ratings for our IT department."
    absent_checks:
      - "audit-preparation"
      - "contract-analysis"
      - "incident-postmortem"
      - "metrics-framework"

  - id: negative_change_request
    category: negative
    prompt: "Create a change impact assessment and rollback plan for our database migration project."
    absent_checks:
      - "audit-preparation"
      - "contract-analysis"
      - "incident-postmortem"
      - "metrics-framework"
